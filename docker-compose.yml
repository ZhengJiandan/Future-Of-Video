# future of video - Docker Compose example
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: future-of-video-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-me-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-delta_force_video}
      MYSQL_USER: ${MYSQL_USER:-fov}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me-db}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 20s
      retries: 10
    networks:
      - future-of-video-network

  redis:
    profiles: ["full"]
    image: redis:7-alpine
    container_name: future-of-video-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - future-of-video-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: future-of-video-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://fov:change-me-db@mysql:3306/delta_force_video}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      PIPELINE_RUNTIME_MODE: ${PIPELINE_RUNTIME_MODE:-minimal}
      DEBUG: ${DEBUG:-true}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - future-of-video-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: future-of-video-worker
    command: celery -A app.celery_app:celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: ${DATABASE_URL:-mysql+aiomysql://fov:change-me-db@mysql:3306/delta_force_video}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      PIPELINE_RUNTIME_MODE: full
      DEBUG: ${DEBUG:-true}
    volumes:
      - ./backend/app:/app/app
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - future-of-video-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: future-of-video-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      VITE_DEV_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    networks:
      - future-of-video-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  future-of-video-network:
    driver: bridge
